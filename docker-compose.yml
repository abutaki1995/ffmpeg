services:
  ffmpeg-api:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
